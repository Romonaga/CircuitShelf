# Copy this file to config/config.yaml and adjust only the bootstrap values.
# Runtime behavior belongs in Postgres app_settings/runtime tables.

APP_HOST: 0.0.0.0
APP_PORT: 1964

# Prefer DATABASE_URL from the environment in production.
# Do not commit real credentials.
DATABASE_URL: ""

# Provider API keys are encrypted in Postgres. This OS-protected file stores the
# master encryption secret used to encrypt/decrypt those keys.
AI_KEY_ENCRYPTION_SECRET_FILE: /etc/circuitshelf/ai-key-encryption.secret
