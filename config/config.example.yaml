# Copy this file to config/config.yaml and adjust local paths, hosts, users, and models.

REACT_DIST_DIR: "frontend/dist"
TRACE_LOG_LEVEL: INFO
QUERY_RETRIES: 3
QUERY_RETRY_DELAY: 5

BYPASS_NLTK_DOWNLOAD: true
TESSERACT_CMD: "/usr/bin/tesseract"

USE_MULTITHREAD_OCR: true
MAX_OCR_THREADS: 8
MAX_DOCUMENT_WORKERS: 4
PDF_RENDER_VECTOR_PAGES: true
PDF_RENDER_MAX_PAGES_PER_DOC: 8
PDF_RENDER_MIN_DRAWINGS: 100
PDF_RENDER_ZOOM: 1.5
USE_ADAPTIVE_CHUNKING: false
ENABLE_MATH_HEAVY_CHUNKING: false
ENABLE_TOKEN_NORMALIZATION: false
SAVE_EXTRACTED_IMAGES: false
INDEX_IMAGE_OCR_AS_TEXT: true

MAX_CHAT_HISTORY_TURNS: 10
MAX_CHAT_HISTORY_CHARS: 10000
POST_TIMEOUT: 600
RAG_CHAT_SYSTEM_PROMPT: "You are CircuitShelf's retrieval-grounded electronics assistant. Use retrieved context as the source of truth. If the context is missing details, say what is missing. For wiring questions, give practical pin-by-pin steps, power and ground details, and safety cautions."

APP_HOST: 127.0.0.1
APP_PORT: 1964
SITE_NAME: "CircuitShelf"

EMBED_MODEL_NAME: "sentence-transformers/all-mpnet-base-v2"
CROSS_ENCODER_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"

LLM_MODEL_NAME: "electronics-helper:latest"
LLM_MODEL_OPTIONS:
  - "electronics-helper:latest"

OLLAMA_API_URL: "http://localhost:11434/api"
LLM_TEMPERATURE: 0.2
LLM_NUM_PREDICT: 3072
LLM_NUM_CTX: 8192

TRAINING_DIR: "training"
TRAINING_RECURSIVE: false
TRAINING_EXCLUDE_DIRS: []
INGEST_HASH_FILES: false
INGEST_WATCH_ENABLED: true
INGEST_WATCH_INTERVAL_SECONDS: 300
STATUS_POLL_INTERVAL_SECONDS: 15
STATUS_POLL_ACTIVE_INTERVAL_SECONDS: 3

# Prefer DATABASE_URL from the environment. Do not commit real credentials.
DATABASE_URL: ""
DB_MIGRATIONS_DIR: "db/migrations"
DB_SCHEMA_VERSION_TABLE: "schema_migrations"
VECTOR_EMBEDDING_DIM: 768

BUILD_INDEX_LOG_FILE: "data/index_build.log"
TRACE_LOG_FILE: "logs/trace.log"

TRACE_ROTATE: time
TRACE_MAX_BYTES: 10485760
TRACE_BACKUP_COUNT: 7
TRACE_WHEN: midnight
TRACE_TIMESTAMPED_NAME: true

DOC_EXT: ".docx"
PDF_EXT: ".pdf"
MD_EXT: ".md"
PROMPT_DIR: "./prompts"
NLTK_DATA_DIR: "./nltk_data"
EXTRACTED_IMAGES_DIR: "extracted_images"
IMG_EXTENSIONS:
  - ".png"
  - ".jpg"
  - ".jpeg"

CHUNK_SIZE: 420
CHUNK_OVERLAP: 80
CHUNKING_MODE: deterministic
SPECIAL_SECTION_PRIORITY:
  Purpose Section: 1.0
  Requirements Section: 0.9
  Assumptions Section: 0.8
  Constraints Section: 0.8
  Design Section: 0.75
  Implementation Section: 0.6
  Testing Section: 0.5
  Results Section: 0.4
  Conclusion Section: 0.3
  Future Work Section: 0.2
LRU_CACHE_SIZE: 200
MIN_TOKENS_PER_CHUNK: 5
MAX_TOKENS_PER_CHUNK: 700
MIN_CHUNK_QUALITY: 0.15
MIN_ACCEPTED_SCORE: 0.25
RERANK_FALLBACK_TOP_K: 8
EMBED_BATCH_SIZE: 16

PROMPT_SECURITY:
  BANNED_PHRASES:
    - "ignore previous"
    - "disregard"
    - "forget instructions"
    - "you are now"
    - "system message"
    - "assistant:"

QUERY_SYNONYMS:
  - ["ground", "gnd"]
  - ["power", "vcc"]
  - ["power", "vdd"]
  - ["supply", "vcc"]
  - ["output", "out"]
  - ["input", "in"]
  - ["microcontroller", "mcu"]
  - ["raspberry pi", "ras-pi"]
  - ["555", "ne555"]
  - ["555 timer", "lm555"]
  - ["op amp", "operational amplifier"]
  - ["mosfet", "fet"]
  - ["datasheet", "data sheet"]

RERANK_PROFILES:
  default:
    weight_vector: 0.4
    weight_rerank: 0.8
    keywords:
      - pin
      - wiring
      - circuit
      - schematic
      - datasheet
      - diagram
      - application
      - typical
      - absolute maximum
      - electrical characteristics
      - 555
      - timer
  technical:
    weight_vector: 0.6
    weight_rerank: 0.4
    keywords:
      - pinout
      - voltage
      - current
      - resistor
      - capacitor
      - transistor
      - oscillator
      - diagram
      - 555
      - timer
      - equation
      - formula
      - timing
  summary:
    weight_vector: 0.3
    weight_rerank: 0.7
    keywords:
      - overview
      - purpose
      - summary
      - goal

CHUNK_CATEGORIES:
  HIGH_LEVEL_DETAIL:
    keywords: ["overview", "introduction", "description", "features", "applications"]
  MED_LEVEL_DETAIL:
    keywords: ["typical application", "operation", "design", "layout", "example"]
  TECH_LEVEL_DETAIL:
    keywords: ["pin", "pinout", "absolute maximum", "electrical characteristics", "timing", "formula", "equation", "package"]

EQUATION_DETECTION:
  MATH_SYMBOLS:
    - "="
    - "<"
    - ">"
    - "\\b[a-zA-Z_]{1,5}\\([^)]{1,30}\\)"
    - "^[A-Z]{1,5}\\(.*\\)"
    - "^[A-Z]{1,5}\\b"
  KEYWORDS:
    - "equation"
    - "formula"
    - "calculate"
    - "calculation"
    - "time constant"
    - "frequency"
    - "period"
    - "duty cycle"
    - "gain"
    - "impedance"
    - "ohm"
    - "farad"
    - "resistance"
    - "capacitance"
    - "inductance"
    - "vout"
    - "vin"
  OCR_CAPTION_KEYWORDS:
    - table
    - graph
    - figure
    - chart
    - diagram
    - plot
    - image
    - illustration
    - equation
    - formula
    - caption
    - captioned

IMAGE_BOOST_KEYWORDS:
  - click
  - enter
  - select
  - choose
  - screen
  - dashboard
  - button
  - setting

SCORING_HEURISTICS:
  LENGTH_PENALTY:
    short: 1.5
    long: -1.5
  SYMBOL_THRESHOLD: 5
  SYMBOL_PENALTY: -0.5
  NUMERIC_DENSITY_THRESHOLD: 0.1
  NUMERIC_DENSITY_PENALTY: -0.5

OCR_TXT_DROP_SCORE: 0.4
OCR_MIN_LENGTH: 20
OCR_MIN_MEANINGFUL_CHARS: 80
OCR_MIN_MEANINGFUL_WORDS: 6
OCR_SHORT_TEXT_MAX_SCORE: 0.3
OCR_LOW_CONTENT_MAX_SCORE: 0.2
OCR_MIN_UNIQUE_CHARS: 10
OCR_MAX_AVG_WORD_LEN: 12
OCR_MIN_ALPHA_RATIO: 0.3
OCR_MAX_SYMBOL_RATIO: 0.4
OCR_MAX_DIGIT_RATIO: 0.5
OCR_MAX_SPACE_RATIO: 0.3
OCR_USE_TESSERACT_CONFIDENCE: true
OCR_MIN_CONFIDENCE: 25
OCR_MIN_IMAGE_WIDTH: 20
OCR_MIN_IMAGE_HEIGHT: 20
OCR_MIN_IMAGE_AREA: 900
OCR_MIN_IMAGE_CONTRAST: 0.0
OCR_INDEX_TEXT_MIN_CHARS: 80
