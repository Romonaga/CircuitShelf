# Copy this file to config/config.yaml and adjust local paths, hosts, users, and models.

REACT_DIST_DIR: "frontend/dist"
TRACE_LOG_LEVEL: INFO
QUERY_RETRIES: 3
QUERY_RETRY_DELAY: 5

TESSERACT_CMD: "/usr/bin/tesseract"
OCR_ENGINE: tesseract
OCR_ENGINE_FALLBACK: true
PADDLEOCR_DEVICE: gpu
PADDLEOCR_LANG: en
PADDLEOCR_ENGINE: ""
PADDLEOCR_PYTHON: ""
PADDLEOCR_TIMEOUT_SECONDS: 120

USE_MULTITHREAD_OCR: true
PDF_RENDER_VECTOR_PAGES: true
PDF_RENDER_MAX_PAGES_PER_DOC: 8
PDF_RENDER_MIN_DRAWINGS: 100
PDF_RENDER_ZOOM: 1.5
PDF_RENDER_RASTER_PAGES: true
PDF_RENDER_MIN_RASTER_COVERAGE: 0.8
PDF_RENDER_OCR_PAGES: true
USE_ADAPTIVE_CHUNKING: false
ENABLE_MATH_HEAVY_CHUNKING: false
ENABLE_TOKEN_NORMALIZATION: false
INDEX_IMAGE_OCR_AS_TEXT: true

MAX_CHAT_HISTORY_TURNS: 10
MAX_CHAT_HISTORY_CHARS: 10000
POST_TIMEOUT: 600
RAG_CHAT_SYSTEM_PROMPT: "You are CircuitShelf's retrieval-grounded electronics assistant. Use retrieved context as the source of truth. If the context is missing details, say what is missing. A CircuitShelf build card is an app-rendered bench card with parts, power notes, pin-by-pin wiring, checks, warnings, and source notes. If the user asks for a build card, treat that as a request for practical build-ready guidance; do not say you do not know what a build card is. For wiring questions, give practical pin-by-pin steps, power and ground details, and safety cautions."

APP_HOST: 127.0.0.1
APP_PORT: 1964
SITE_NAME: "CircuitShelf"
SERVER_PID_FILE: "data/circuitshelf.pid"

EMBED_MODEL_NAME: "sentence-transformers/all-mpnet-base-v2"
CROSS_ENCODER_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"
MODEL_DEVICE: auto

LLM_MODEL_NAME: "electronics-helper:latest"
LLM_MODEL_OPTIONS:
  - "electronics-helper:latest"

OLLAMA_API_URL: "http://localhost:11434/api"
LOCAL_LLM_MAX_CONCURRENT: 1
LOCAL_LLM_QUEUE_TIMEOUT_SECONDS: 300
LOCAL_GPU_LLM_SLOTS: auto
LOCAL_GPU_CUDA_SLOTS: auto
LOCAL_GPU_QUEUE_TIMEOUT_SECONDS: 300
# Ollama VRAM retention after a local chat request. Use "0" to unload immediately.
OLLAMA_KEEP_ALIVE: "30s"
LLM_TEMPERATURE: 0.2
LLM_NUM_PREDICT: 3072
LLM_NUM_CTX: 8192

TRAINING_DIR: "training"
TRAINING_RECURSIVE: false
TRAINING_EXCLUDE_DIRS: []
INGEST_WATCH_ENABLED: true
INGEST_WATCH_INTERVAL_SECONDS: 300
STATUS_POLL_INTERVAL_SECONDS: 15
STATUS_POLL_ACTIVE_INTERVAL_SECONDS: 3

# Prefer DATABASE_URL from the environment. Do not commit real credentials.
DATABASE_URL: ""
# Provider API keys are encrypted in Postgres with pgcrypto.
# Store the master encryption secret in this OS-protected file, not YAML or DB.
AI_KEY_ENCRYPTION_SECRET_FILE: "/etc/circuitshelf/ai-key-encryption.secret"
DB_MIGRATIONS_DIR: "db/migrations"
DB_SCHEMA_VERSION_TABLE: "schema_migrations"
VECTOR_EMBEDDING_DIM: 768

BUILD_INDEX_LOG_FILE: "data/index_build.log"
TRACE_LOG_FILE: "logs/trace.log"
LOG_RETENTION_DAYS: 7

TRACE_ROTATE: time
TRACE_MAX_BYTES: 10485760
TRACE_BACKUP_COUNT: 7
TRACE_WHEN: midnight
TRACE_TIMESTAMPED_NAME: false

DOC_EXT: ".docx"
PDF_EXT: ".pdf"
MD_EXT: ".md"
PROMPT_DIR: "./prompts"
IMG_EXTENSIONS:
  - ".png"
  - ".jpg"
  - ".jpeg"

CHUNK_SIZE: 420
CHUNK_OVERLAP: 80
CHUNKING_MODE: deterministic
SPECIAL_SECTION_PRIORITY:
  Purpose Section: 1.0
  Requirements Section: 0.9
  Assumptions Section: 0.8
  Constraints Section: 0.8
  Design Section: 0.75
  Implementation Section: 0.6
  Testing Section: 0.5
  Results Section: 0.4
  Conclusion Section: 0.3
  Future Work Section: 0.2
RESPONSE_CACHE_CAPACITY: 200
MIN_TOKENS_PER_CHUNK: 5
MAX_TOKENS_PER_CHUNK: 700
MIN_CHUNK_QUALITY: 0.15
MIN_ACCEPTED_SCORE: 0.25
RERANK_FALLBACK_TOP_K: 8
RERANK_MAX_CONTEXT_CHUNKS: 15
EMBED_BATCH_SIZE: 16
EMBED_BATCH_AUTO: true
RERANK_BATCH_SIZE: 32
RERANK_BATCH_AUTO: true

PROMPT_SECURITY:
  BANNED_PHRASES:
    - "ignore previous"
    - "disregard"
    - "forget instructions"
    - "you are now"
    - "system message"
    - "assistant:"

QUERY_SYNONYMS:
  - ["ground", "gnd"]
  - ["power", "vcc"]
  - ["power", "vdd"]
  - ["supply", "vcc"]
  - ["output", "out"]
  - ["input", "in"]
  - ["microcontroller", "mcu"]
  - ["raspberry pi", "ras-pi"]
  - ["555", "ne555"]
  - ["555 timer", "lm555"]
  - ["op amp", "operational amplifier"]
  - ["mosfet", "fet"]
  - ["datasheet", "data sheet"]

RERANK_PROFILES:
  default:
    weight_vector: 0.4
    weight_rerank: 0.6
    keywords: []
  wiring:
    weight_vector: 0.3
    weight_rerank: 0.65
    keywords:
      - breadboard
      - build
      - connect
      - diagram
      - parts
      - pin to pin
      - pin-to-pin
      - project
      - schematic
      - wire
      - wiring
  datasheet:
    weight_vector: 0.45
    weight_rerank: 0.5
    keywords:
      - absolute maximum
      - current
      - data sheet
      - datasheet
      - electrical characteristics
      - package
      - pin
      - pinout
      - supply
      - vcc
      - vdd
      - voltage
  timing_math:
    weight_vector: 0.5
    weight_rerank: 0.45
    keywords:
      - 555
      - calculate
      - duty cycle
      - equation
      - formula
      - frequency
      - oscillator
      - period
      - timer
      - timing
  summary:
    weight_vector: 0.25
    weight_rerank: 0.7
    keywords:
      - explain
      - overview
      - purpose
      - summary
      - what is

CHUNK_CATEGORIES:
  HIGH_LEVEL_DETAIL:
    keywords: ["overview", "introduction", "description", "features", "applications"]
  MED_LEVEL_DETAIL:
    keywords: ["typical application", "operation", "design", "layout", "example"]
  TECH_LEVEL_DETAIL:
    keywords: ["pin", "pinout", "absolute maximum", "electrical characteristics", "timing", "formula", "equation", "package"]

EQUATION_DETECTION:
  MATH_SYMBOLS:
    - "="
    - "<"
    - ">"
    - "\\b[a-zA-Z_]{1,5}\\([^)]{1,30}\\)"
    - "^[A-Z]{1,5}\\(.*\\)"
    - "^[A-Z]{1,5}\\b"
  KEYWORDS:
    - "equation"
    - "formula"
    - "calculate"
    - "calculation"
    - "time constant"
    - "frequency"
    - "period"
    - "duty cycle"
    - "gain"
    - "impedance"
    - "ohm"
    - "farad"
    - "resistance"
    - "capacitance"
    - "inductance"
    - "vout"
    - "vin"
  OCR_CAPTION_KEYWORDS:
    - table
    - graph
    - figure
    - chart
    - diagram
    - plot
    - image
    - illustration
    - equation
    - formula
    - caption
    - captioned

IMAGE_BOOST_KEYWORDS:
  - click
  - enter
  - select
  - choose
  - screen
  - dashboard
  - button
  - setting

SCORING_HEURISTICS:
  LENGTH_PENALTY:
    short: 1.5
    long: -1.5
  SYMBOL_THRESHOLD: 5
  SYMBOL_PENALTY: -0.5
  NUMERIC_DENSITY_THRESHOLD: 0.1
  NUMERIC_DENSITY_PENALTY: -0.5

OCR_TXT_DROP_SCORE: 0.4
OCR_MIN_LENGTH: 20
OCR_MIN_MEANINGFUL_CHARS: 80
OCR_MIN_MEANINGFUL_WORDS: 6
OCR_SHORT_TEXT_MAX_SCORE: 0.3
OCR_LOW_CONTENT_MAX_SCORE: 0.2
OCR_MIN_UNIQUE_CHARS: 10
OCR_MAX_AVG_WORD_LEN: 12
OCR_MIN_ALPHA_RATIO: 0.3
OCR_MAX_SYMBOL_RATIO: 0.4
OCR_MAX_DIGIT_RATIO: 0.5
OCR_MAX_SPACE_RATIO: 0.3
OCR_USE_TESSERACT_CONFIDENCE: true
OCR_MIN_CONFIDENCE: 25
OCR_MIN_IMAGE_WIDTH: 20
OCR_MIN_IMAGE_HEIGHT: 20
OCR_MIN_IMAGE_AREA: 900
PDF_EMBEDDED_IMAGE_OCR_MIN_WIDTH: 80
PDF_EMBEDDED_IMAGE_OCR_MIN_HEIGHT: 80
PDF_EMBEDDED_IMAGE_OCR_MIN_AREA: 6400
OCR_MIN_IMAGE_CONTRAST: 0.0
OCR_INDEX_TEXT_MIN_CHARS: 80
